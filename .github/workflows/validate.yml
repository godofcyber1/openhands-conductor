name: Validate

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  plugin:
    name: Validate OpenHands Conductor
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate plugin package
        shell: pwsh
        run: .\plugins\openhands-conductor\scripts\validate-plugin.ps1
